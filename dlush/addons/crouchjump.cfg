// ===== DLUSH crouch jump =====

// runner alias called by dlush.vtest
alias CJ! ""

// bind entry
alias +CrouchJump "alias CJ! CJ_step1"
alias -CrouchJump "alias CJ! CJ_rel1"

// press sequence (duck -> jump)
alias CJ_step1 "+duck; alias CJ! CJ_step2"
alias CJ_step2 "+jump; alias CJ! CJ_done"
alias CJ_done  "alias CJ!"

// release sequence (unduck -> unjump)
alias CJ_rel1  "-duck; alias CJ! CJ_rel2"
alias CJ_rel2  "-jump; alias CJ! CJ_done"


echo "╔════════════════════════════════════════════╗"
echo "║  CROUCH JUMP MODULE LOADED SUCCESSFULLY    ║"
echo "╚════════════════════════════════════════════╝"