// ===== DLUSH shift volume=====

// runner alias called by dlush.vtest
alias SH! ""

// your volumes
alias VOL_BASE "volume 0.23"
alias VOL_SHIFT "volume 0.32"

// bind entry points
alias +ShiftVol "alias SH! SH_press"
alias -ShiftVol "alias SH! SH_release"

// press/release actions (executed by vtest, not in the input event)
alias SH_press   "+sprint; VOL_SHIFT; alias SH! SH_idle"
alias SH_release "-sprint; VOL_BASE;  alias SH! SH_idle"
alias SH_idle    "alias SH! "

echo "╔═════════════════════════════════════════════╗"
echo "║  SHIFT VOLUME MODULE LOADED SUCCESSFULLY    ║"
echo "╚═════════════════════════════════════════════╝"