// ===== DLUSH QuickSwitch (hold knife) =====

// runner alias called by dlush.vtest
alias QS! ""

// entry points
alias +QuickKnife "alias QS! QS_press"
alias -QuickKnife "alias QS! QS_release"

// press: switch to knife
alias QS_press   "slot3; alias QS! QS_idle"

// release: return to primary
alias QS_release "slot1; alias QS! QS_idle"

alias QS_idle "alias QS! "

echo "╔═════════════════════════════════════════════╗"
echo "║  QUICK SWITCH MODULE LOADED SUCCESSFULLY    ║"
echo "╚═════════════════════════════════════════════╝"