//load main commands
exec dlush/commands


// load crouch jump module
exec dlush/addons/crouchjump
bind "ALT" "+CrouchJump"


// load shift volume module
exec dlush/addons/shiftvol
bind "SHIFT" "+ShiftVol"

// load quick switch module
exec dlush/addons/quickswitch
bind "MOUSE5" "+QuickKnife"

// load chat wheel for practice module
exec dlush/wheel/prac_logic
bind "l" "+prac_wheel"

// load chat wheel module
exec dlush/wheel/knife_logic
bind "k" "+knife_wheel"

// load chat wheel for crosshair module
exec dlush/wheel/xhair_logic
bind "j" "+xhair_wheel"

// load quick switch module
exec dlush/movement/NULL
bind W +nullW; 
bind A +nullA; 
bind S +nullS; 
bind D +nullD;


//check

play buttons\button9
exec dlush/clear