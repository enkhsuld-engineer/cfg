// dlush/wheel/knife_logic.cfg

alias reset_deadzone "cl_radialmenu_deadzone_size 0.4"

// hotkey state machine (same idea as map_hotkey1/2)
alias knife_hotkey1 "alias +knife_wheel +knife_wheel_1; alias -knife_wheel -knife_wheel_1"
alias knife_hotkey2 "alias +knife_wheel +knife_wheel_2; alias -knife_wheel -knife_wheel_2"
knife_hotkey1

alias +knife_wheel_1 "reset_deadzone; exec dlush/wheel/knife_labels; +radialradio2"
alias -knife_wheel_1 "knife_hotkey2"

alias +knife_wheel_2 "exec dlush/wheel/knife_cmd"
alias -knife_wheel_2 "-radialradio2; knife_hotkey1; resetradio"

echo "╔═══════════════════════════════════╗"
echo "║  KNIFE WHEEL LOADED SUCCESSFULLY  ║"
echo "╚═══════════════════════════════════╝"
